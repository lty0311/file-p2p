name = "webrtc-signal-server"
main = "signal.js"
compatibility_date = "2026-06-12"

workers_dev = true
preview_urls = true

[[routes]]
pattern = "p2pfile.cool-emoji.com"
zone_name = "cool-emoji.com"
custom_domain = true
enabled = true
previews_enabled = false

[vars]
DOWNLOAD_URL = "https://github.com/lty0311/file-p2p/releases"
LATEST_VERSION = "1.0.0"

# Durable Objects 配置
[[durable_objects.bindings]]
name = "SIGNAL_ROOM"
class_name = "SignalRoom"

# Durable Objects 迁移配置（免费套餐必须使用 new_sqlite_classes）
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalRoom"]

