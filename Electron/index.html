<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>P2P文件传输</title>
  <style>
    *{box-sizing:border-box}
    body{padding:30px;font-family:system-ui}
    .box{margin:10px 0}
    input{padding:8px;width:300px;font-size:16px}
    button{padding:8px 16px;cursor:pointer;margin-right:5px}
    #progress{width:100%;height:10px;background:#eee;margin:10px 0}
    #bar{height:100%;width:0%;background:#2563eb}
    .file-item{display:flex;align-items:center;padding:8px;border:1px solid #ddd;margin:5px 0;border-radius:4px}
    .file-item span{flex:1;margin-right:10px}
    .file-item button{margin-left:5px}
    .received-file{display:flex;align-items:center;padding:8px;border:1px solid #ddd;margin:5px 0;border-radius:4px}
    .received-file span{flex:1;margin-right:10px}
    .received-file button{margin-left:5px}
    .status-success{color:green}
    .status-pending{color:orange}
    .status-rejected{color:red}
  </style>
</head>
<body>
  <div class="box">
    <h3>6位传输码</h3>
    <input id="codeInput" maxlength="6" placeholder="输入6位数字">
    <button id="genCode">生成随机码</button>
    <button id="connectBtn">连接对方</button>
  </div>
  
  <div class="box">
    <button id="pickFile">添加文件到发送列表</button>
    <div id="sendList" style="margin-top:10px;">
      <h4>待发送文件列表:</h4>
      <div id="sendFiles"></div>
      <button id="sendAllBtn" style="display:none;">发送全部</button>
    </div>
  </div>
  
  <div id="receiveArea" style="display:none;">
    <h4>收到文件请求:</h4>
    <div id="receiveFiles"></div>
  </div>
  
  <div id="progress"><div id="bar"></div></div>
  <div id="status">请输入传输码开始</div>

  <script>
    const API = window.electronAPI;
    // ========== 配置 ==========
    const SIGNAL_URL = "ws://192.168.20.29:8080";
    const STUN_SERVERS = [{urls:"stun:stun.cloudflare.com:3478"}, { urls: "stun:stun.qq.com:3478" }];
    const CHUNK_SIZE = 256 * 1024;
    
    // ========== 全局变量 ==========
    let ws = null;
    let pc = null;
    let dc = null;
    let isReady = false;
    let isSending = false;
    
    // 文件列表（支持多文件）
    let sendFiles = [];      // 发送队列 [{id, path, name, size, sentBytes, status}]
    let receiveFiles = [];   // 接收队列 [{id, name, size, status}]
    
    const statusEl = document.getElementById("status");
    const barEl = document.getElementById("bar");
    const codeInput = document.getElementById("codeInput");
    const genCodeBtn = document.getElementById("genCode");
    const connectBtn = document.getElementById("connectBtn");
    const pickFileBtn = document.getElementById("pickFile");
    const sendFilesEl = document.getElementById("sendFiles");
    const sendAllBtn = document.getElementById("sendAllBtn");
    const receiveArea = document.getElementById("receiveArea");
    const receiveFilesEl = document.getElementById("receiveFiles");

    // 生成6位随机传输码
    genCodeBtn.onclick = ()=>{
      const code = String(Math.floor(100000 + Math.random()*900000));
      codeInput.value = code;
      navigator.clipboard.writeText(code);
      statusEl.textContent = "已生成传输码，已复制剪贴板";
    }

    // 添加文件到发送列表
    pickFileBtn.onclick = async ()=>{
      const paths = await API.selectFiles(); // 需要支持多选
      if(!paths || paths.length === 0) return;
      
      for(const path of paths){
        const info = await API.getFileInfo(path);
        if(info){
          const fileItem = {
            id: Date.now() + Math.random(),
            path,
            name: info.name,
            size: info.size,
            sentBytes: 0,
            status: "pending"
          };
          sendFiles.push(fileItem);
          renderSendList();
        }
      }
      
      if(sendFiles.length > 0){
        sendAllBtn.style.display = "inline";
        statusEl.textContent = `已添加 ${paths.length} 个文件到发送列表`;
      }
    }

    // 渲染发送列表
    function renderSendList(){
      if(sendFiles.length === 0){
        sendFilesEl.innerHTML = "<p>暂无待发送文件</p>";
        sendAllBtn.style.display = "none";
        return;
      }
      
      sendFilesEl.innerHTML = sendFiles.map(f => `
        <div class="file-item">
          <span>${f.name} (${formatSize(f.size)})</span>
          <span>${f.status === "pending" ? "等待发送" : f.status === "sending" ? "发送中..." : f.status === "done" ? "<span class='status-success'>已完成</span>" : "<span class='status-rejected'>被拒绝</span>"}</span>
          <button onclick="removeSendFile(${f.id})">删除</button>
        </div>
      `).join('');
    }

    // 从发送列表删除文件
    window.removeSendFile = (id)=>{
      sendFiles = sendFiles.filter(f => f.id !== id);
      renderSendList();
      statusEl.textContent = "已从发送列表移除文件";
    }

    // 发送全部文件
    sendAllBtn.onclick = async ()=>{
      if(isSending){
        statusEl.textContent = "正在发送中，请稍候...";
        return;
      }
      
      // 只获取待发送的文件（排除已完成和已拒绝的）
      const pendingFiles = sendFiles.filter(f => f.status === "pending");
      if(pendingFiles.length === 0){
        statusEl.textContent = "没有待发送的文件";
        return;
      }
      
      sendAllBtn.style.display = "none";
      
      if(ws && ws.readyState === WebSocket.OPEN && isReady){
        statusEl.textContent = "开始建立P2P连接...";
        isSending = true;
        
        // 如果DataChannel还没建立，先创建
        if(!dc){
          dc = pc.createDataChannel("file");
          bindDataChannel();
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          ws.send(JSON.stringify({type:"offer", data:offer}));
          console.log("[DEBUG] 创建DataChannel并发送offer");
          // DataChannel建立后会自动发送文件列表（在bindDataChannel的onopen中）
        } else {
          // DataChannel已存在，只发送待发送的文件
          const fileList = pendingFiles.map(f => ({
            id: f.id,
            name: f.name,
            size: f.size
          }));
          dc.send(JSON.stringify({type:"file_list", files: fileList}));
          console.log("[DEBUG] 发送待发送文件列表:", fileList);
        }
      } else if(!ws || ws.readyState !== WebSocket.OPEN){
        const code = codeInput.value.trim();
        if(code.length !==6){
          statusEl.textContent = "请先输入6位传输码";
          sendAllBtn.style.display = "inline";
          return;
        }
        statusEl.textContent = "正在连接信令服务器...";
        await connectToSignalServer(code);
      }
    }

    // 连接信令服务器
    async function connectToSignalServer(code){
      if(ws) ws.close();
      if(pc) pc.close();

      ws = new WebSocket(`${SIGNAL_URL}?code=${code}`);
      pc = new RTCPeerConnection({iceServers:STUN_SERVERS});

      pc.onicecandidate = e=>{
        if(e.candidate && ws && ws.readyState === WebSocket.OPEN){
          ws.send(JSON.stringify({type:"ice", data:e.candidate}));
        }
      }

      pc.ondatachannel = e=>{
        dc = e.channel;
        bindDataChannel();
      }

      ws.onmessage = async (e)=>{
        const msg = JSON.parse(e.data);
        if(msg.type === "ready"){
          isReady = true;
          statusEl.textContent = "双方已就绪，开始建立P2P连接...";
          if(sendFiles.length > 0 && !dc){
            dc = pc.createDataChannel("file");
            bindDataChannel();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({type:"offer", data:offer}));
          }
        }else if(msg.type === "ice"){
          await pc.addIceCandidate(new RTCIceCandidate(msg.data));
        }else if(msg.type === "offer"){
          await pc.setRemoteDescription(new RTCSessionDescription(msg.data));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          ws.send(JSON.stringify({type:"answer", data:answer}));
        }else if(msg.type === "answer"){
          await pc.setRemoteDescription(new RTCSessionDescription(msg.data));
        }
      }

      ws.onopen = ()=>{
        statusEl.textContent = "信令连接成功，等待对方接入";
      }

      ws.onerror = (err) => {
        console.error("[DEBUG] WebSocket错误:", err);
        statusEl.textContent = "WebSocket错误";
      }
    }

    // 连接按钮
    connectBtn.onclick = async ()=>{
      const code = codeInput.value.trim();
      if(code.length !==6) return statusEl.textContent = "请输入6位数字传输码";
      await connectToSignalServer(code);
    }

    // 绑定DataChannel事件
    function bindDataChannel(){
      dc.binaryType = "arraybuffer";
      dc.onopen = ()=>{
        console.log("[DEBUG] DataChannel 已打开!");
        statusEl.textContent = "DataChannel 已打开";
        if(sendFiles.length > 0){
          const fileList = sendFiles.map(f => ({
            id: f.id,
            name: f.name,
            size: f.size
          }));
          dc.send(JSON.stringify({type:"file_list", files: fileList}));
        }
      }
      dc.onerror = (err) => {
        console.error("[DEBUG] DataChannel 错误:", err);
      }
      dc.onclose = () => {
        console.log("[DEBUG] DataChannel 已关闭");
        isSending = false;
      }
      dc.onmessage = async (e)=>{
        if(typeof e.data === "string"){
          try {
            const msg = JSON.parse(e.data);
            if(msg.type === "file_list"){
              // 接收方收到文件列表，追加新文件（避免重复）
              const newFiles = msg.files.filter(newFile => 
                !receiveFiles.some(existing => existing.id === newFile.id)
              );
             
              newFiles.forEach(f => {
                receiveFiles.push({
                  ...f,
                  status: "pending",
                  receivedBytes: 0
                });
              });
              
              renderReceiveList();
              receiveArea.style.display = "block";
              statusEl.textContent = `收到 ${newFiles.length} 个新文件请求`;
            }else if(msg.type === "file_select"){
              // 收到接收方的选择
              const fileId = msg.fileId;
              const accept = msg.accept;
              const file = sendFiles.find(f => f.id === fileId);
              if(file){
                if(accept){
                  file.status = "sending";
                  renderSendList();
                  // 开始发送这个文件
                  await sendFileById(fileId);
                }else{
                  file.status = "rejected";
                  renderSendList();
                  // 检查是否还有待发送的文件
                  checkNextFile();
                }
              }
            }else if(msg.type === "ack"){
              // 收到ACK，继续发送
              const fileId = msg.fileId;
              const file = sendFiles.find(f => f.id === fileId);
              if(file && file.status === "sending"){
                await sendFileChunk(fileId);
              }
            }else if(msg.type === "file_done"){
              // 文件传输完成
              const fileId = msg.fileId;
              const file = sendFiles.find(f => f.id === fileId);
              if(file){
                file.status = "done";
                file.sentBytes = file.size;
                renderSendList();
                statusEl.textContent = `文件 ${file.name} 传输完成！`;
                checkNextFile();
              }
            }
          } catch(err) {
            console.error("[DEBUG] 解析消息出错:", err);
          }
        }else{
          // 二进制文件块
          const meta = JSON.parse(sessionStorage.getItem("currentReceive"));
          if(meta){
            const file = receiveFiles.find(f => f.id === meta.fileId);
            if(file && file.status === "receiving"){
              try {
                await API.writeChunk(meta.savePath, e.data, file.receivedBytes);
                file.receivedBytes += e.data.byteLength;
                if(file.receivedBytes >= file.size){
                  file.status = "done";
                  statusEl.textContent = `文件 ${file.name} 接收完成！`;
                  dc.send(JSON.stringify({type:"file_done", fileId: file.id}));
                  renderReceiveList();
                }else{
                  dc.send(JSON.stringify({type:"ack", fileId: file.id}));
                }
              } catch(err) {
                console.error("[DEBUG] 写入文件块出错:", err);
              }
            }
          }
        }
      }
    }

    // 渲染接收列表
    function renderReceiveList(){
      if(receiveFiles.length === 0){
        receiveFilesEl.innerHTML = "<p>暂无文件</p>";
        return;
      }
      
      receiveFilesEl.innerHTML = receiveFiles.map(f => `
        <div class="received-file">
          <span>${f.name} (${formatSize(f.size)})</span>
          <span>${f.status === "pending" ? "<span class='status-pending'>待确认</span>" : f.status === "receiving" ? "接收中..." : f.status === "done" ? "<span class='status-success'>已完成</span>" : "<span class='status-rejected'>已拒绝</span>"}</span>
          ${f.status === "pending" ? `
            <button onclick="acceptFile(${f.id})">接收</button>
            <button onclick="rejectFile(${f.id})">拒绝</button>
          ` : ""}
        </div>
      `).join('');
    }

    // 接收文件
    window.acceptFile = async (id)=>{
      const file = receiveFiles.find(f => f.id === id);
      if(!file || file.status !== "pending") return;
      
      const savePath = await API.selectSave(file.name);
      if(!savePath){
        statusEl.textContent = "已取消接收";
        return;
      }
      
      file.status = "receiving";
      file.receivedBytes = 0;
      renderReceiveList();
      statusEl.textContent = `开始接收文件：${file.name}`;
      
      // 保存当前接收状态
      sessionStorage.setItem("currentReceive", JSON.stringify({fileId: id, savePath}));
      
      // 通知发送方开始发送
      dc.send(JSON.stringify({type:"file_select", fileId: id, accept: true}));
    }

    // 拒绝文件
    window.rejectFile = (id)=>{
      const file = receiveFiles.find(f => f.id === id);
      if(!file || file.status !== "pending") return;
      
      file.status = "rejected";
      renderReceiveList();
      statusEl.textContent = `已拒绝文件：${file.name}`;
      
      // 通知发送方拒绝
      dc.send(JSON.stringify({type:"file_select", fileId: id, accept: false}));
    }

    // 发送单个文件
    async function sendFileById(fileId){
      const file = sendFiles.find(f => f.id === fileId);
      if(!file) return;
      
      file.sentBytes = 0;
      statusEl.textContent = `正在发送：${file.name}`;
      await sendFileChunk(fileId);
    }

    // 发送文件块
    async function sendFileChunk(fileId){
      const file = sendFiles.find(f => f.id === fileId);
      if(!file || file.status !== "sending") return;
      
      if(file.sentBytes >= file.size){
        return;
      }
      
      const actualChunkSize = Math.min(CHUNK_SIZE, file.size - file.sentBytes);
      const chunk = await API.readChunk(file.path, file.sentBytes, actualChunkSize);
      
      // 先发送文件ID标识
      dc.send(JSON.stringify({type:"file_chunk_start", fileId: file.id}));
      await delay(10);
      dc.send(chunk);
      
      file.sentBytes += chunk.byteLength;
      console.log("[DEBUG] 发送文件块: fileId=", fileId, "offset=", file.sentBytes - chunk.byteLength, "size=", chunk.byteLength);
    }

    // 检查下一个待发送文件
    function checkNextFile(){
      const pendingFile = sendFiles.find(f => f.status === "pending");
      if(pendingFile){
        // 等待接收方选择下一个文件
        statusEl.textContent = `等待对方确认下一个文件...`;
      }else{
        isSending = false;
        const allDone = sendFiles.every(f => f.status === "done");
        if(allDone){
          statusEl.textContent = "所有文件传输完成！可以添加新文件继续传输";
        }else{
          statusEl.textContent = "当前批次处理完成";
        }
        sendAllBtn.style.display = "inline";
      }
    }

    // 延迟函数
    function delay(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // 格式化文件大小
    function formatSize(bytes){
      if(bytes < 1024) return bytes + "B";
      if(bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + "KB";
      return (bytes / (1024 * 1024)).toFixed(1) + "MB";
    }
  </script>
</body>
</html>
