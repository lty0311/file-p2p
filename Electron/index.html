<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>P2P文件传输</title>
  <style>
    *{box-sizing:border-box}
    body{padding:30px;font-family:system-ui}
    .box{margin:10px 0}
    input{padding:8px;width:300px;font-size:16px}
    button{padding:8px 16px;cursor:pointer}
    #progress{width:100%;height:10px;background:#eee;margin:10px 0}
    #bar{height:100%;width:0%;background:#2563eb}
  </style>
</head>
<body>
  <div class="box">
    <h3>6位传输码</h3>
    <input id="codeInput" maxlength="6" placeholder="输入6位数字">
    <button id="genCode">生成随机码</button>
    <button id="connectBtn">连接对方</button>
  </div>
  <div class="box">
    <button id="pickFile">选择要发送的文件</button>
    <div id="fileTip"></div>
  </div>
  <div id="progress"><div id="bar"></div></div>
  <div id="status">等待连接...</div>

  <script>
    const API = window.electronAPI;
    // ========== 配置 ==========
    // 本地测试用（需要先运行 node local-signal-server.js）：
    const SIGNAL_URL = "ws://192.168.20.29:8080";
    // 生产环境使用 Cloudflare Workers（需要 Durable Objects）：
    // const SIGNAL_URL = "wss://p2pfile.cool-emoji.com/signal";
    const STUN_SERVERS = [{urls:"stun:stun.cloudflare.com:3478"}, { urls: "stun:stun.qq.com:3478" }];
    const CHUNK_SIZE = 256 * 1024; // 256KB分块
    // ========== 全局变量 ==========
    let ws = null;
    let pc = null;
    let dc = null;
    let localFilePath = "";
    let saveFilePath = "";
    let fileSize = 0;
    let sentBytes = 0;
    let receivedBytes = 0;
    let isReady = false; // 标记是否收到服务器的ready消息

    const statusEl = document.getElementById("status");
    const barEl = document.getElementById("bar");
    const codeInput = document.getElementById("codeInput");
    const genCodeBtn = document.getElementById("genCode");
    const connectBtn = document.getElementById("connectBtn");
    const pickFileBtn = document.getElementById("pickFile");
    const fileTip = document.getElementById("fileTip");

    // 生成6位随机传输码
    genCodeBtn.onclick = ()=>{
      const code = String(Math.floor(100000 + Math.random()*900000));
      codeInput.value = code;
      navigator.clipboard.writeText(code);
      statusEl.textContent = "已生成传输码，已复制剪贴板";
    }

    // 选择本地待发送文件
    pickFileBtn.onclick = async ()=>{
      const path = await API.selectFile();
      if(!path) return;
      localFilePath = path;
      const info = await API.getFileInfo(path);
      if(!info) return;
      fileSize = info.size;
      fileTip.textContent = `待发送：${info.name} 大小：${formatSize(fileSize)}`;
      
      // 如果已经连接到信令服务器且收到ready消息，立即发起打洞
      if(ws && ws.readyState === WebSocket.OPEN && isReady && !dc){
        statusEl.textContent = "已选择文件，开始建立P2P连接...";
        dc = pc.createDataChannel("file");
        bindDataChannel();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({type:"offer", data:offer}));
        console.log("[DEBUG] 选择文件后发送offer");
      }
    }

    // 连接信令服务器，开始打洞
    connectBtn.onclick = async ()=>{
      const code = codeInput.value.trim();
      if(code.length !==6) return statusEl.textContent = "请输入6位数字传输码";
      if(ws) ws.close();
      if(pc) pc.close();

      // 1. 建立WebSocket信令通道
      ws = new WebSocket(`${SIGNAL_URL}?code=${code}`);
      statusEl.textContent = "正在连接信令服务器...";

      // 2. 初始化WebRTC
      pc = new RTCPeerConnection({iceServers:STUN_SERVERS});

      // ICE 连接状态监控
      pc.oniceconnectionstatechange = () => {
        console.log("[DEBUG] ICE连接状态:", pc.iceConnectionState);
        if(pc.iceConnectionState === "connected") {
          statusEl.textContent = "P2P连接已建立！";
          console.log("[DEBUG] ICE连接已建立");
        } else if(pc.iceConnectionState === "failed") {
          statusEl.textContent = "P2P连接失败，尝试重新连接...";
          console.error("[DEBUG] ICE连接失败");
        }
      };
      
      pc.onicegatheringstatechange = () => {
        console.log("[DEBUG] ICE收集状态:", pc.iceGatheringState);
      };

      // 收到ICE候选，转发给对端
      pc.onicecandidate = e=>{
        if(e.candidate){
          console.log("[DEBUG] 本地ICE候选:", e.candidate.candidate.substring(0, 50));
          ws.send(JSON.stringify({type:"ice", data:e.candidate}));
        } else {
          console.log("[DEBUG] ICE候选收集完成（gathering complete）");
        }
      }

      // 接收端监听DataChannel（对方主动创建通道）
      pc.ondatachannel = e=>{
        dc = e.channel;
        bindDataChannel();
      }

      // WebSocket 信令消息处理
      ws.onmessage = async (e)=>{
        try {
          console.log("[DEBUG] 收到原始消息:", e.data);
          const msg = JSON.parse(e.data);
          console.log("[DEBUG] 解析后消息类型:", msg.type);
          
          if(msg.type === "ready"){
            console.log("[DEBUG] 收到ready消息，开始打洞");
            isReady = true;
            statusEl.textContent = "双方已就绪，开始建立P2P连接...";
            if(localFilePath && !dc){
              console.log("[DEBUG] 作为发送方创建DataChannel...");
              dc = pc.createDataChannel("file");
              bindDataChannel();
              const offer = await pc.createOffer();
              await pc.setLocalDescription(offer);
              console.log("[DEBUG] 设置localDescription完成，发送offer...");
              ws.send(JSON.stringify({type:"offer", data:offer}));
              console.log("[DEBUG] offer已发送");
            } else {
              console.log("[DEBUG] 作为接收方等待offer... localFilePath:", localFilePath, "dc:", dc);
            }
          }else if(msg.type === "ice"){
            console.log("[DEBUG] 收到ICE候选");
            await pc.addIceCandidate(new RTCIceCandidate(msg.data));
            console.log("[DEBUG] ICE候选已添加");
          }else if(msg.type === "offer"){
            console.log("[DEBUG] 收到offer，准备创建answer...");
            await pc.setRemoteDescription(new RTCSessionDescription(msg.data));
            console.log("[DEBUG] remoteDescription已设置");
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            console.log("[DEBUG] localDescription(answer)已设置，发送answer...");
            ws.send(JSON.stringify({type:"answer", data:answer}));
            console.log("[DEBUG] answer已发送");
          }else if(msg.type === "answer"){
            console.log("[DEBUG] 收到answer");
            await pc.setRemoteDescription(new RTCSessionDescription(msg.data));
            console.log("[DEBUG] remoteDescription(answer)已设置");
          }else if(msg.type === "p2p_ready"){
            statusEl.textContent = "P2P直连建立，断开信令服务器，开始传输";
            ws.close();
            ws = null;
            sendFile();
          }else if(msg.type === "error"){
            statusEl.textContent = msg.msg;
            console.error("[DEBUG] 服务器错误:", msg.msg);
          }else{
            console.log("[DEBUG] 未知消息类型:", msg.type);
          }
        } catch(err) {
          console.error("[DEBUG] 处理消息时出错:", err);
          statusEl.textContent = "处理信令消息出错: " + err.message;
        }
      }

      ws.onopen = async ()=>{
        statusEl.textContent = "信令连接成功，等待对方接入";
        console.log("[DEBUG] WebSocket连接已打开，code:", code);
      }
      
      ws.onerror = (err) => {
        console.error("[DEBUG] WebSocket错误:", err);
        statusEl.textContent = "WebSocket错误";
      }
      
      ws.onclose = (e) => {
        console.log("[DEBUG] WebSocket连接已关闭, code:", e.code, "reason:", e.reason);
      }
    }

    // 绑定DataChannel事件（P2P直连通道）
    function bindDataChannel(){
      dc.binaryType = "arraybuffer";
      dc.onopen = ()=>{
        console.log("[DEBUG] DataChannel 已打开!");
        statusEl.textContent = "DataChannel 已打开，通知对方...";
        // 直连通道打开，通知对方关闭服务器
        dc.send(JSON.stringify({type:"p2p_ready"}));
        // 如果是发送方，发送文件元信息（不立即发送文件块）
        if(localFilePath){
          const info = {
            type: "file_meta",
            name: localFilePath.split(/[\\/]/).pop(),
            size: fileSize
          };
          dc.send(JSON.stringify(info));
          console.log("[DEBUG] 发送文件元信息:", info);
          // 等待接收方确认后再发送文件
        }
      }
      dc.onerror = (err) => {
        console.error("[DEBUG] DataChannel 错误:", err);
      }
      dc.onclose = () => {
        console.log("[DEBUG] DataChannel 已关闭");
      }
      dc.onmessage = async (e)=>{
        // 接收文件元信息
        if(typeof e.data === "string"){
          try {
            const meta = JSON.parse(e.data);
            if(meta.type === "p2p_ready"){
              console.log("[DEBUG] 收到p2p_ready");
            }else if(meta.type === "file_meta"){
              console.log("[DEBUG] 收到文件元信息:", meta);
              // 接收方选择保存路径，传入默认文件名
              saveFilePath = await API.selectSave(meta.name);
              if(!saveFilePath){
                statusEl.textContent = "已取消接收";
                return;
              }
              fileSize = meta.size;
              statusEl.textContent = `接收文件：${meta.name} 总大小：${formatSize(fileSize)}`;
              // 通知发送方已准备好接收
              dc.send(JSON.stringify({type:"save_ready"}));
              console.log("[DEBUG] 发送保存准备就绪消息");
            }else if(meta.type === "save_ready"){
              console.log("[DEBUG] 收到接收方准备就绪消息，开始发送文件");
              statusEl.textContent = "接收方已就绪，开始发送文件...";
              sentBytes = 0;
              sendFile();
            }else if(meta.type === "ack"){
              console.log("[DEBUG] 收到ack, offset:", meta.offset);
              // 收到对方确认，继续发送下一块
              sentBytes = meta.offset;
              sendFile();
            }
          } catch(err) {
            console.error("[DEBUG] 解析消息出错:", err);
          }
        }else{
          // 二进制文件块，写入本地
          if(!saveFilePath){
            console.error("[DEBUG] 错误：保存路径未设置，无法写入文件块");
            return;
          }
          try {
            await API.writeChunk(saveFilePath, e.data, receivedBytes);
            receivedBytes += e.data.byteLength;
            updateProgress(receivedBytes, fileSize);
            // 回发ACK，请求下一分块
            dc.send(JSON.stringify({type:"ack", offset:receivedBytes}));
            console.log("[DEBUG] 写入文件块: offset=", receivedBytes - e.data.byteLength, "size=", e.data.byteLength);
          } catch(err) {
            console.error("[DEBUG] 写入文件块出错:", err);
          }
        }
      }
    }

    // 分块流式发送文件（仅P2P通道，不走服务器）
    async function sendFile(){
      if(sentBytes >= fileSize) {
        statusEl.textContent = "文件传输完成！";
        console.log("[DEBUG] 文件传输完成!");
        return;
      }
      // 计算实际要发送的块大小（不能超过剩余字节数）
      const actualChunkSize = Math.min(CHUNK_SIZE, fileSize - sentBytes);
      const chunk = await API.readChunk(localFilePath, sentBytes, actualChunkSize);
      dc.send(chunk);
      console.log("[DEBUG] 发送文件块: offset=", sentBytes, "size=", chunk.byteLength);
      // 更新已发送字节数
      sentBytes += chunk.byteLength;
      updateProgress(sentBytes, fileSize);
    }

    // 进度更新
    function updateProgress(current, total){
      const pct = (current / total * 100).toFixed(1);
      barEl.style.width = pct + "%";
      statusEl.textContent = `进度：${pct}% ${formatSize(current)}/${formatSize(total)}`;
    }

    // 格式化文件大小
    function formatSize(bytes){
      if(bytes <1024) return bytes+"B";
      if(bytes <1024*1024) return (bytes/1024).toFixed(1)+"KB";
      return (bytes/1024/1024).toFixed(1)+"MB";
    }
  </script>
</body>
</html>
